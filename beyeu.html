<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành riêng cho Ly ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", sans-serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:400% 400%;
    animation: gradientMove 10s ease infinite;
}

/* 🌈 nền động */
@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 🎬 màn hình mở đầu */
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
    color:white;
}

#startScreen button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
}

/* 💌 card */
.card{
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    z-index:10;
}

.big-heart{
    font-size:70px;
    animation:pulse 1.5s infinite;
}

.names{
    font-size:30px;
    color:#ff4d6d;
    font-weight:bold;
    margin-top:10px;
}

.days{
    margin-top:15px;
    color:#ff4d6d;
    font-weight:bold;
    font-size:18px;
}

/* ✍️ typing effect */
.line{
    margin-top:18px;
    font-size:20px;
    color:#444;
    min-height:30px;
}

.btn{
    display:none;
    margin-top:25px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.secret{
    display:none;
    margin-top:20px;
    color:#ff4d6d;
    line-height:1.8;
    font-size:18px;
    animation:fadeIn 1s ease;
}

/* 💖 tim bay */
.heart{
    position:absolute;
    bottom:-50px;
    font-size:20px;
    animation:floatUp linear forwards;
    opacity:0.8;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* 📱 mobile */
@media(max-width:600px){
    .card{padding:25px;}
    .names{font-size:24px;}
    .line{font-size:18px;}
}
</style>
</head>

<body>

<!-- 🎬 START -->
<div id="startScreen">
    <h2>💖 Dành riêng cho bạn 💖</h2>
    <p style="margin:10px 0;">Bấm để bắt đầu</p>
    <button onclick="start()">Vào xem ❤️</button>
</div>

<!-- 🎵 nhạc -->
<audio id="bgMusic" loop>
    <source src="'một đời' - 14 Casper & Bon Nghiêm (feat (mp3cut.net).mp3" type="audio/mpeg">
</audio>

<div class="card">

    <div class="big-heart">💖</div>
    <div class="names">Yang ❤️ Ly</div>

    <div class="days" id="daysCounter"></div>

    <div class="line" id="line"></div>

    <button class="btn" id="openBtn" onclick="showSecret()">
        💌 Mở thư
    </button>

    <div class="secret" id="secret">
        Ly à ❤️<br><br>
        Cảm ơn em vì đã xuất hiện trong cuộc đời anh.<br><br>
        Từ 23/02/2024 đến hôm nay,<br>
        mỗi ngày có em đều là một ngày đặc biệt.<br><br>
        Anh nhớ em 🥺<br><br>
        Yang ❤️ Ly
    </div>

</div>

<script>

const music = document.getElementById("bgMusic");

/* 🚀 bắt đầu */
function start(){
    document.getElementById("startScreen").style.display="none";
    music.play();

    typeText("Bé yêu ơi 🥺 Anh nhớ bé nhiều lắm ❤️");
}

/* ✍️ typing effect */
let i = 0;
function typeText(text){
    const el = document.getElementById("line");
    el.innerHTML = "";
    i = 0;

    let timer = setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i >= text.length) clearInterval(timer);
    },80);
}

/* 📅 đếm ngày */
const loveDate = new Date("2024-02-23");

function updateCounter(){
    const now = new Date();
    const diff = now - loveDate;
    const days = Math.floor(diff/(1000*60*60*24));

    document.getElementById("daysCounter").innerHTML =
    "💞 " + days + " ngày bên nhau";
}
updateCounter();

/* 💌 mở thư */
function showSecret(){
    document.getElementById("secret").style.display="block";
}

/* 💖 tim bay nhẹ */
function createHeart(){
    const h = document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),8000);
}

setInterval(createHeart,250);

</script>

</body>
</html>

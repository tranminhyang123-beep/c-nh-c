<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành riêng cho Ly ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", sans-serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.card{
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.big-heart{
    font-size:70px;
    animation:pulse 1.5s infinite;
}

.names{
    font-size:30px;
    color:#ff4d6d;
    font-weight:bold;
    margin-top:10px;
}

.days{
    margin-top:15px;
    color:#ff4d6d;
    font-weight:bold;
    font-size:18px;
}

.line{
    margin-top:18px;
    font-size:20px;
    color:#444;
}

.btn{
    margin-top:25px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.secret{
    display:none;
    margin-top:20px;
    color:#ff4d6d;
    line-height:1.8;
    font-size:18px;
}

.heart{
    position:absolute;
    bottom:-50px;
    font-size:20px;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
}
</style>
</head>

<body>

<div class="card">

    <div class="big-heart">💖</div>

    <div class="names">Yang ❤️ Ly</div>

    <div class="days" id="daysCounter"></div>

    <div class="line">Bé yêu ơi 🥺</div>
    <div class="line">Anh yêu bé nhiều lắm ❤️</div>
    <div class="line">Anh nhớ bé nhiều lắm 💕</div>

    <button class="btn" onclick="showSecret()">
        💌 Mở thư
    </button>

    <div class="secret" id="secret">
        Ly à ❤️<br><br>
        Cảm ơn em đã xuất hiện trong cuộc đời anh.<br><br>
        Từ 23/02/2024 đến hôm nay,<br>
        mỗi ngày có em đều là một ngày đặc biệt.<br><br>
        Anh nhớ em 🥺<br><br>
        Yang ❤️ Ly
    </div>

</div>

<script>

// ===== đếm ngày =====
const loveDate = new Date("2024-02-23");

function updateCounter(){
    const now = new Date();
    const diff = now - loveDate;
    const days = Math.floor(diff/(1000*60*60*24));

    document.getElementById("daysCounter").innerHTML =
    "💞 " + days + " ngày bên nhau";
}
updateCounter();

// ===== mở thư =====
function showSecret(){
    document.getElementById("secret").style.display="block";
}

// ===== tim bay =====
function createHeart(){
    const h = document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
